{% extends "home.html" %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Add Stock Card{% endblock title %}</title>
</head>
<body>
    {% block content %}
        <div class="container-fluid content">
            <div class="backButton">
                <a href="{% url 'stock-card' %}">
                    <button class="btn btn-primary">
                        <i class="fa-solid fa-angle-left"></i>
                        Back
                    </button>
                </a>
            </div>
            <h2>Add Stock Card:</h2>

            <!-- Form for adding the stock card details -->
            <div>
                <form method="post" class="content addition">
                    {% csrf_token %}

                        {{ form.as_p }}

                        <button type="submit" class="btn btn-primary">Save</button>
                </form>
            </div>
        </div>

        <script>
            $('#measurement').change(function() {
                console.log($('#measurement').val());
            });
        </script>
    {% endblock content %}
</body>
</html>
